name: djitsotsu

services:
  postgres:
    image: postgres:16-alpine
    container_name: djitsotsu-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-djitsotsu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djitsotsu}
      POSTGRES_DB: ${POSTGRES_DB:-djitsotsu}
    ports:
      - "${POSTGRES_PORT:-5543}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djitsotsu}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: djitsotsu-redis
    ports:
      - "${REDIS_PORT:-6390}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: djitsotsu-auth
    ports:
      - "${AUTH_PORT:-5401}:5401"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: djitsotsu-gateway
    ports:
      - "${GATEWAY_PORT:-5400}:5400"
    env_file: .env
    depends_on:
      - auth

  guilds:
    build:
      context: ..
      dockerfile: services/guilds/Dockerfile
    container_name: djitsotsu-guilds
    ports:
      - "${GUILDS_PORT:-5402}:5402"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
    container_name: djitsotsu-chat
    ports:
      - "${CHAT_PORT:-5403}:5403"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  voice:
    build:
      context: ..
      dockerfile: services/voice/Dockerfile
    container_name: djitsotsu-voice
    ports:
      - "${VOICE_PORT:-5404}:5404"
    env_file: .env

volumes:
  postgres_data:

networks:
  default:
    name: djitsotsu-network
